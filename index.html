<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <div class="header">
            <button class="back-btn">
                <svg width="45" height="45" viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M26.25 33.75L15 22.5L26.25 11.25L28.875 13.875L20.25 22.5L28.875 31.125L26.25 33.75Z" fill="#FBF8FE"/>
                </svg>
            </button>

            <h1>Create a post</h1>

            <button class="icon-btn">
                <svg width="45" height="45" viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.5 22.5C20.4375 22.5 18.6719 21.7656 17.2031 20.2969C15.7344 18.8281 15 17.0625 15 15C15 12.9375 15.7344 11.1719 17.2031 9.70313C18.6719 8.23438 20.4375 7.5 22.5 7.5C24.5625 7.5 26.3281 8.23438 27.7969 9.70313C29.2656 11.1719 30 12.9375 30 15C30 17.0625 29.2656 18.8281 27.7969 20.2969C26.3281 21.7656 24.5625 22.5 22.5 22.5ZM7.5 37.5V32.25C7.5 31.1875 7.77344 30.2109 8.32031 29.3203C8.86719 28.4297 9.59375 27.75 10.5 27.2812C12.4375 26.3125 14.4062 25.5859 16.4062 25.1016C18.4062 24.6172 20.4375 24.375 22.5 24.375C24.5625 24.375 26.5938 24.6172 28.5938 25.1016C30.5938 25.5859 32.5625 26.3125 34.5 27.2812C35.4063 27.75 36.1328 28.4297 36.6797 29.3203C37.2266 30.2109 37.5 31.1875 37.5 32.25V37.5H7.5ZM11.25 33.75H33.75V32.25C33.75 31.9062 33.6641 31.5938 33.4922 31.3125C33.3203 31.0312 33.0938 30.8125 32.8125 30.6562C31.125 29.8125 29.4219 29.1797 27.7031 28.7578C25.9844 28.3359 24.25 28.125 22.5 28.125C20.75 28.125 19.0156 28.3359 17.2969 28.7578C15.5781 29.1797 13.875 29.8125 12.1875 30.6562C11.9062 30.8125 11.6797 31.0312 11.5078 31.3125C11.3359 31.5938 11.25 31.9062 11.25 32.25V33.75ZM22.5 18.75C23.5312 18.75 24.4141 18.3828 25.1484 17.6484C25.8828 16.9141 26.25 16.0312 26.25 15C26.25 13.9688 25.8828 13.0859 25.1484 12.3516C24.4141 11.6172 23.5312 11.25 22.5 11.25C21.4688 11.25 20.5859 11.6172 19.8516 12.3516C19.1172 13.0859 18.75 13.9688 18.75 15C18.75 16.0312 19.1172 16.9141 19.8516 17.6484C20.5859 18.3828 21.4688 18.75 22.5 18.75Z" fill="#FBF8FE"/>
                </svg>
            </button>
        </div>

        <div class="container">
            <div class="left">

                <h3 class="section-title">Media:</h3>

                <div class="media">
                    <img src="image/space.jpg" alt="space">
                    <div class="add">+</div>
                </div>

                <h3 class="section-title">Tags:</h3>
                <div class="tags">#StandWithUkraine</div>

                <hr class="divider">

                <div class="text-section">
                    <div class="text-header">
                        <span class="label">Text:</span>
                        <input type="text" class="short-input" placeholder="Lorem ipsum">
                    </div>

                    <textarea class="long-input" placeholder="Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."></textarea>

                    <div class="targets">
                        <span class="targets-label">Targets:</span>

                        <div class="targets-list">
                            <div class="tags">Viber</div>
                            <div class="tags">Telegram</div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="right">
                <h3 class="section-title">Post preview:</h3>
                <div class="preview">
                    <div class="preview-title">
                        <div class="left-side">
                            <div class="menu-btn">
                                <svg width="27" height="24" viewBox="0 0 27 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M3.35809 18V16H23.5066V18H3.35809ZM3.35809 13V11H23.5066V13H3.35809ZM3.35809 8V6H23.5066V8H3.35809Z" fill="#1D1B20"/>
                                </svg>
                            </div>
                        </div>

                        <div class="title">Telegram-desktop</div>

                        <div class="right-side">
                            <div class="search-btn">
                                <svg width="27" height="24" viewBox="0 0 27 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M21.9395 21L14.8875 14.7C14.3278 15.1 13.6842 15.4167 12.9566 15.65C12.229 15.8833 11.4548 16 10.6339 16C8.60038 16 6.87936 15.3708 5.47083 14.1125C4.0623 12.8542 3.35803 11.3167 3.35803 9.5C3.35803 7.68333 4.0623 6.14583 5.47083 4.8875C6.87936 3.62917 8.60038 3 10.6339 3C12.6674 3 14.3884 3.62917 15.797 4.8875C17.2055 6.14583 17.9098 7.68333 17.9098 9.5C17.9098 10.2333 17.7792 10.925 17.518 11.575C17.2568 12.225 16.9023 12.8 16.4546 13.3L23.5066 19.6L21.9395 21ZM10.6339 14C12.0331 14 13.2224 13.5625 14.2019 12.6875C15.1813 11.8125 15.671 10.75 15.671 9.5C15.671 8.25 15.1813 7.1875 14.2019 6.3125C13.2224 5.4375 12.0331 5 10.6339 5C9.23469 5 8.04537 5.4375 7.06592 6.3125C6.08648 7.1875 5.59676 8.25 5.59676 9.5C5.59676 10.75 6.08648 11.8125 7.06592 12.6875C8.04537 13.5625 9.23469 14 10.6339 14Z" fill="#1D1B20"/>
                                </svg>
                            </div>

                            <div class="more-btn">
                                <svg width="27" height="24" viewBox="0 0 27 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6.71614 14C6.10049 14 5.57346 13.8042 5.13504 13.4125C4.69663 13.0208 4.47742 12.55 4.47742 12C4.47742 11.45 4.69663 10.9792 5.13504 10.5875C5.57346 10.1958 6.10049 10 6.71614 10C7.33179 10 7.85883 10.1958 8.29724 10.5875C8.73566 10.9792 8.95487 11.45 8.95487 12C8.95487 12.55 8.73566 13.0208 8.29724 13.4125C7.85883 13.8042 7.33179 14 6.71614 14ZM13.4323 14C12.8167 14 12.2896 13.8042 11.8512 13.4125C11.4128 13.0208 11.1936 12.55 11.1936 12C11.1936 11.45 11.4128 10.9792 11.8512 10.5875C12.2896 10.1958 12.8167 10 13.4323 10C14.048 10 14.575 10.1958 15.0134 10.5875C15.4518 10.9792 15.6711 11.45 15.6711 12C15.6711 12.55 15.4518 13.0208 15.0134 13.4125C14.575 13.8042 14.048 14 13.4323 14ZM20.1485 14C19.5329 14 19.0058 13.8042 18.5674 13.4125C18.129 13.0208 17.9098 12.55 17.9098 12C17.9098 11.45 18.129 10.9792 18.5674 10.5875C19.0058 10.1958 19.5329 10 20.1485 10C20.7642 10 21.2912 10.1958 21.7296 10.5875C22.168 10.9792 22.3872 11.45 22.3872 12C22.3872 12.55 22.168 13.0208 21.7296 13.4125C21.2912 13.8042 20.7642 14 20.1485 14Z" fill="#1D1B20"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="desktop">
                        <img src="image/telegram.jpg" class="desktop-img" alt="telegram-desktop">
                        <div class="overlay">
                            <div class="overlay-header">Company name</div>
                            <img src="image/space.jpg" class="overlay-img" alt="space">
                            <div class="overlay-text">
                                Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="publish">
                    <div class="publish-text">Publish</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
